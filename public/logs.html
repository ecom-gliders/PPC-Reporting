<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Logs - PPC Reporting</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at 0% 0%, #fff7ed 0%, transparent 45%),
                radial-gradient(circle at 100% 0%, #eff6ff 0%, transparent 45%),
                #f8fafc;
    background-attachment: fixed;
  }
  .fade-in { animation: fadeIn .3s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: translateY(0);} }
  html.dark { filter: invert(1) hue-rotate(180deg); }
  html.dark img, html.dark svg, html.dark video, html.dark canvas, html.dark iframe {
    filter: invert(1) hue-rotate(180deg);
  }
</style>
<script>
  if (localStorage.getItem('darkMode') === '1') document.documentElement.classList.add('dark');
</script>
</head>
<body class="text-slate-800 min-h-screen">

<div class="sticky top-0 z-20 bg-slate-900 shadow-lg shadow-slate-900/10">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between gap-4">
    <div class="flex items-center gap-3 min-w-0">
      <img src="/logo.png" alt="Logo" class="w-8 h-8 object-contain shrink-0" />
      <div class="min-w-0">
        <h1 class="text-sm font-bold tracking-tight text-white leading-tight truncate">Logs</h1>
      </div>
      <div class="hidden sm:block h-6 w-px bg-slate-700"></div>
      <p class="hidden sm:block text-sm text-slate-400 truncate">Who uploaded what, when, and why</p>
    </div>
    <div class="flex items-center gap-2 shrink-0">
      <a id="backLink" href="/clients.html" class="text-xs font-semibold text-slate-300 hover:text-white px-3 py-2 rounded-lg hover:bg-white/10 transition">?� Dashboard</a>
      <div class="hidden sm:block h-5 w-px bg-slate-700"></div>
      <button id="darkModeToggle" title="Toggle dark mode" class="text-xs font-semibold text-slate-300 hover:text-white px-2.5 py-2 rounded-lg hover:bg-white/10 transition">??</button>
      <button id="logoutBtn" class="text-xs font-semibold text-slate-300 hover:text-white px-3 py-2 rounded-lg hover:bg-white/10 transition">Logout</button>
    </div>
  </div>
</div>

<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

  <div class="flex flex-wrap items-center gap-3 mb-4">
    <input id="logSearch" type="text" placeholder="Search by client, user, file name, or context..." class="border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white shadow-sm focus:ring-2 focus:ring-orange-400 focus:outline-none w-full sm:w-96" />
    <span id="logCount" class="text-[11px] font-semibold text-orange-600 bg-orange-50 ring-1 ring-orange-200 rounded-full px-2.5 py-0.5"></span>
  </div>

  <div class="bg-white rounded-2xl border-2 border-slate-300 shadow-sm overflow-hidden fade-in">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="text-[11px] uppercase tracking-wider text-slate-400 bg-slate-50">
            <th class="py-2.5 px-3 font-semibold border-b border-slate-200 whitespace-nowrap">Date/Time (PKT)</th>
            <th class="py-2.5 px-3 font-semibold border-b border-slate-200">Client</th>
            <th class="py-2.5 px-3 font-semibold border-b border-slate-200">Uploaded By</th>
            <th class="py-2.5 px-3 font-semibold border-b border-slate-200">File</th>
            <th class="py-2.5 px-3 font-semibold border-b border-slate-200">Rows</th>
            <th class="py-2.5 px-3 font-semibold border-b border-slate-200">Context</th>
          </tr>
        </thead>
        <tbody id="logTableBody"></tbody>
      </table>
    </div>
    <div id="logEmpty" class="hidden p-8 text-center text-sm text-slate-400">No uploads recorded yet.</div>
  </div>

</div>

<!-- DETAIL MODAL -->
<div id="detailModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-lg max-w-lg w-full p-5">
    <div class="flex items-center justify-between mb-3">
      <h4 id="detailModalTitle" class="font-bold text-slate-900">Details</h4>
      <button id="detailModalClose" class="text-slate-400 hover:text-slate-600 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div id="detailModalBody" class="text-sm text-slate-700 break-words max-h-[60vh] overflow-y-auto whitespace-pre-wrap"></div>
  </div>
</div>

<script>
function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function formatPkt(iso) {
  if (!iso) return '�?"';
  return new Date(iso).toLocaleString('en-PK', { timeZone: 'Asia/Karachi', dateStyle: 'medium', timeStyle: 'short' });
}

let allLogs = [];
let detailStore = [];

const CLIENT_ID = new URLSearchParams(window.location.search).get('clientId');

async function loadLogs() {
  if (CLIENT_ID) {
    document.getElementById('backLink').href = `/dashboard.html?clientId=${encodeURIComponent(CLIENT_ID)}`;
    allLogs = await fetch(`/api/upload-logs?clientId=${encodeURIComponent(CLIENT_ID)}`).then((r) => r.json());
    if (allLogs.length) {
      document.querySelector('p.text-slate-400').textContent = `${allLogs[0].clientName} �?" Who uploaded what, when, and why`;
    }
  } else {
    allLogs = await fetch('/api/upload-logs').then((r) => r.json());
  }
  renderLogs();
}

function renderLogs() {
  detailStore = [];
  const search = document.getElementById('logSearch').value.trim().toLowerCase();
  let logs = allLogs;
  if (search) {
    logs = logs.filter((l) =>
      (l.clientName || '').toLowerCase().includes(search) ||
      (l.uploadedBy || '').toLowerCase().includes(search) ||
      (l.fileName || '').toLowerCase().includes(search) ||
      (l.context || '').toLowerCase().includes(search)
    );
  }

  document.getElementById('logCount').textContent = `${logs.length} upload${logs.length === 1 ? '' : 's'}`;

  const body = document.getElementById('logTableBody');
  const empty = document.getElementById('logEmpty');
  if (!logs.length) {
    body.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  body.innerHTML = logs
    .map((l, i) => {
      const contextIdx = detailStore.push({ title: 'Context', html: escapeHtml(l.context || '') }) - 1;
      const contextShort = (l.context || '').length > 60 ? (l.context || '').slice(0, 60) + '.' : (l.context || '�?"');
      return `
      <tr class="${i % 2 === 0 ? 'bg-white' : 'bg-slate-50/60'} hover:bg-orange-50/70 transition-colors">
        <td class="py-2.5 px-3 text-xs text-slate-500 whitespace-nowrap border-b border-slate-100">${formatPkt(l.uploadedAt)}</td>
        <td class="py-2.5 px-3 text-sm font-semibold text-slate-800 border-b border-slate-100 whitespace-nowrap">${escapeHtml(l.clientName)}</td>
        <td class="py-2.5 px-3 text-sm font-mono text-slate-600 border-b border-slate-100 whitespace-nowrap">${escapeHtml(l.uploadedBy)}</td>
        <td class="py-2.5 px-3 text-sm text-slate-700 border-b border-slate-100 max-w-xs truncate" title="${escapeHtml(l.fileName)}">
          ${l.type === 'summary' ? `<span class="inline-flex items-center gap-1 text-xs font-semibold text-orange-600 bg-orange-50 ring-1 ring-orange-200 rounded-full px-2 py-0.5">?? ${escapeHtml(l.fileName)}</span>` : escapeHtml(l.fileName)}
        </td>
        <td class="py-2.5 px-3 text-xs text-slate-500 border-b border-slate-100 whitespace-nowrap">${l.type === 'summary' ? `${l.totalRows} changes / ${l.added} ASINs` : `${l.added} new / ${l.totalRows} total`}</td>
        <td class="py-2.5 px-3 text-sm text-slate-700 border-b border-slate-100 max-w-sm">
          <div class="flex items-center gap-1.5 min-w-0">
            <span class="truncate">${escapeHtml(contextShort)}</span>
            <button type="button" class="detail-eye-btn inline-flex items-center justify-center text-slate-400 hover:text-orange-600 transition shrink-0" data-idx="${contextIdx}" title="View full context">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </button>
          </div>
        </td>
      </tr>`;
    })
    .join('');
}

document.getElementById('logSearch').addEventListener('input', renderLogs);

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.detail-eye-btn');
  if (!btn) return;
  const detail = detailStore[Number(btn.dataset.idx)];
  if (!detail) return;
  document.getElementById('detailModalTitle').textContent = detail.title;
  document.getElementById('detailModalBody').innerHTML = detail.html;
  document.getElementById('detailModal').classList.remove('hidden');
});
document.getElementById('detailModalClose').addEventListener('click', () => {
  document.getElementById('detailModal').classList.add('hidden');
});
document.getElementById('detailModal').addEventListener('click', (e) => {
  if (e.target.id === 'detailModal') document.getElementById('detailModal').classList.add('hidden');
});

const darkModeToggle = document.getElementById('darkModeToggle');
darkModeToggle.textContent = document.documentElement.classList.contains('dark') ? '�~?️' : '??';
darkModeToggle.addEventListener('click', () => {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('darkMode', isDark ? '1' : '0');
  darkModeToggle.textContent = isDark ? '�~?️' : '??';
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login.html';
});

loadLogs();
</script>
</body>
</html>
