<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PPC Change History Overview</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at 0% 0%, #fff7ed 0%, transparent 45%),
                radial-gradient(circle at 100% 0%, #eff6ff 0%, transparent 45%),
                #f8fafc;
    background-attachment: fixed;
  }
  .fade-in { animation: fadeIn .3s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: translateY(0);} }
  .glass {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
  }
</style>
</head>
<body class="text-slate-800 min-h-screen">

<!-- Sticky header -->
<div class="sticky top-0 z-20 bg-slate-900 shadow-lg shadow-slate-900/10">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between gap-4">
    <div class="flex items-center gap-3 min-w-0">
      <div class="w-8 h-8 shrink-0 rounded-lg bg-orange-500 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
      </div>
      <div class="min-w-0 hidden sm:block">
        <h1 class="text-sm font-bold tracking-tight text-white leading-tight truncate">PPC Change History</h1>
      </div>
      <div class="hidden sm:block h-6 w-px bg-slate-700"></div>
      <div class="flex items-center gap-1.5 min-w-0 text-sm">
        <a id="allClientsLink" href="/clients.html" class="text-slate-400 hover:text-white transition shrink-0">All Clients</a>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-slate-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        <span id="clientNameLabel" class="font-semibold text-white truncate">Loading...</span>
      </div>
    </div>

    <div class="flex items-center gap-2 shrink-0">
      <a id="changeHistoryLink" href="#" class="inline-flex items-center gap-1.5 bg-orange-500 hover:bg-orange-400 text-white text-xs font-semibold px-3.5 py-2 rounded-lg transition">
        Change History
      </a>
      <a id="adminLink" href="/admin.html" class="hidden text-xs font-semibold text-slate-300 hover:text-white px-3 py-2 rounded-lg hover:bg-white/10 transition">Admin Panel</a>
      <div class="hidden sm:block h-5 w-px bg-slate-700"></div>
      <span id="userBadge" class="hidden sm:inline text-xs font-medium text-slate-400"></span>
      <button id="logoutBtn" class="text-xs font-semibold text-slate-300 hover:text-white px-3 py-2 rounded-lg hover:bg-white/10 transition">Logout</button>
    </div>
  </div>
</div>

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">

  <!-- Stats -->
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
    <div class="relative bg-white rounded-2xl border-2 border-slate-300 p-4 shadow-sm overflow-hidden">
      <div class="absolute -right-4 -top-4 w-16 h-16 rounded-full bg-orange-50"></div>
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide relative">Total Changes</p>
      <p id="statTotal" class="text-3xl font-extrabold text-slate-900 mt-1 relative">—</p>
    </div>
    <div class="relative bg-white rounded-2xl border-2 border-slate-300 p-4 shadow-sm overflow-hidden">
      <div class="absolute -right-4 -top-4 w-16 h-16 rounded-full bg-sky-50"></div>
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide relative">ASINs Tracked</p>
      <p id="statAsins" class="text-3xl font-extrabold text-slate-900 mt-1 relative">—</p>
    </div>
    <div class="relative bg-white rounded-2xl border-2 border-slate-300 p-4 shadow-sm overflow-hidden">
      <div class="absolute -right-4 -top-4 w-16 h-16 rounded-full bg-emerald-50"></div>
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide relative">Days Logged</p>
      <p id="statDates" class="text-3xl font-extrabold text-slate-900 mt-1 relative">—</p>
    </div>
    <div class="relative bg-white rounded-2xl border-2 border-slate-300 p-4 shadow-sm overflow-hidden">
      <div class="absolute -right-4 -top-4 w-16 h-16 rounded-full bg-violet-50"></div>
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide relative">Weekly Summaries</p>
      <p id="statSummaries" class="text-3xl font-extrabold text-slate-900 mt-1 relative">—</p>
    </div>
  </div>

  <!-- Date filter -->
  <div class="flex flex-wrap items-center gap-3 mb-6">
    <label class="text-sm font-medium text-slate-600">From:</label>
    <input id="fromDate" type="date" class="border border-slate-300 rounded-lg px-2 py-2 text-sm bg-white shadow-sm" />
    <label class="text-sm font-medium text-slate-600">To:</label>
    <input id="toDate" type="date" class="border border-slate-300 rounded-lg px-2 py-2 text-sm bg-white shadow-sm" />
    <button id="applyFilterBtn" class="inline-flex items-center gap-2 bg-slate-900 hover:bg-slate-700 text-white text-sm font-semibold px-4 py-2 rounded-lg shadow transition">Apply</button>
    <button id="clearFilterBtn" class="text-sm font-semibold text-slate-500 hover:text-slate-700 px-3 py-2">Clear</button>
  </div>

  <!-- Charts grid -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
    <div class="bg-white rounded-2xl border-2 border-slate-300 p-5 shadow-sm">
      <h3 class="text-sm font-bold text-slate-900 mb-3">Activity Over Time</h3>
      <canvas id="chartActivity" height="220"></canvas>
    </div>
    <div class="bg-white rounded-2xl border-2 border-slate-300 p-5 shadow-sm">
      <h3 class="text-sm font-bold text-slate-900 mb-3">Action Type Breakdown</h3>
      <canvas id="chartActionBreakdown" height="220"></canvas>
    </div>
    <div class="bg-white rounded-2xl border-2 border-slate-300 p-5 shadow-sm">
      <h3 class="text-sm font-bold text-slate-900 mb-3">Bid Increases vs Decreases</h3>
      <canvas id="chartBids" height="220"></canvas>
    </div>
    <div class="bg-white rounded-2xl border-2 border-slate-300 p-5 shadow-sm">
      <h3 class="text-sm font-bold text-slate-900 mb-3">Top ASINs by Activity</h3>
      <canvas id="chartTopAsins" height="220"></canvas>
    </div>
    <div class="bg-white rounded-2xl border-2 border-slate-300 p-5 shadow-sm lg:col-span-2">
      <h3 class="text-sm font-bold text-slate-900 mb-3">Campaigns Paused Over Time</h3>
      <canvas id="chartCampaignsPaused" height="180"></canvas>
    </div>
  </div>

</div>

<script src="overview.js"></script>
</body>
</html>
