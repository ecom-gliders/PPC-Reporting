<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login - PPC Change History</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center text-slate-800"
      style="background: radial-gradient(circle at 0% 0%, #fff7ed 0%, transparent 45%), radial-gradient(circle at 100% 0%, #eff6ff 0%, transparent 45%), #f8fafc;">

  <div class="w-full max-w-sm">
    <div class="flex flex-col items-center mb-6">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-orange-500 via-orange-400 to-amber-300 flex items-center justify-center shadow-lg shadow-orange-200/70 ring-1 ring-orange-300/40 mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
      </div>
      <h1 class="text-xl font-extrabold tracking-tight text-slate-900">PPC Change History</h1>
      <p class="text-sm text-slate-500">Sign in to continue</p>
    </div>

    <form id="loginForm" class="bg-white rounded-2xl border-2 border-slate-300 shadow-sm p-6 space-y-4">
      <div>
        <label class="block text-sm font-semibold text-slate-600 mb-1">Username</label>
        <input id="username" type="text" required autocomplete="username"
          class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-orange-400 focus:outline-none" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-600 mb-1">Password</label>
        <input id="password" type="password" required autocomplete="current-password"
          class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-orange-400 focus:outline-none" />
      </div>
      <div id="loginError" class="hidden text-sm text-rose-600 bg-rose-50 border border-rose-200 rounded-lg px-3 py-2"></div>
      <button type="submit" class="w-full bg-slate-900 hover:bg-slate-700 text-white text-sm font-semibold px-4 py-2.5 rounded-xl shadow-md transition">
        Sign In
      </button>
    </form>
  </div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errBox = document.getElementById('loginError');
  errBox.classList.add('hidden');

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    window.location.href = '/';
  } catch (err) {
    errBox.textContent = err.message;
    errBox.classList.remove('hidden');
  }
});
</script>
</body>
</html>
